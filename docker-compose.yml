# ============================================================================
# VulnScan Platform — Docker Compose orchestration
#
# Single entry point for the whole system: `docker compose up -d` must leave
# every service healthy with no manual follow-up steps.
#
# Two networks by design:
#   - app-network: platform services talk to each other (frontend, backend,
#     scanner, reports, n8n, db).
#   - lab-network: segmented network for vulnerable lab targets. Only the
#     scanner service bridges into both networks, so the lab is never
#     reachable from the frontend/n8n/backend/db — they simply have no
#     route to lab-network at all. NOTE: this is deliberately a plain
#     bridge network, not `internal: true`. Docker silently skips host
#     port publishing for containers whose only network is internal
#     (verified empirically while building this module — `docker port`
#     returns nothing even though `ports:` is configured), which would
#     make Juice Shop/DVWA unreachable from the host browser. The actual
#     safety guarantee — the platform never scans anything outside this
#     lab — is enforced at the application layer: the Backend API
#     (Módulo 3) only accepts targets whitelisted via `targets.is_lab_target`.
#     See docs/lab.md.
#
# This file is a scaffold (Módulo 0): networks, volumes and service stubs
# are defined now; each service's build context is filled in as its module
# is completed. Services are commented out until their Dockerfile exists so
# `docker compose up -d` stays runnable at every stage of development.
# ============================================================================

networks:
  app-network:
    driver: bridge
  lab-network:
    driver: bridge

volumes:
  postgres-data:
  n8n-data:
  reports-data:

services:
  # --------------------------------------------------------------------
  # Database — PostgreSQL (Módulo 1)
  # --------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --------------------------------------------------------------------
  # Migrate — one-shot Alembic runner, applies the schema then exits
  # (Módulo 1). Any service depending on the schema should declare
  # `depends_on: migrate: condition: service_completed_successfully`.
  # --------------------------------------------------------------------
  migrate:
    build:
      context: ./database
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # --------------------------------------------------------------------
  # Backend API — FastAPI orchestrator (Módulo 3)
  #
  # Build context is the repo root, not ./backend: the image needs both
  # backend/app and database/models (see backend/Dockerfile) since the
  # Backend reuses the same ORM models Alembic migrates, rather than
  # redefining the schema.
  # --------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      # No :-default here on purpose: an empty/unset whitelist must fail
      # loudly at startup (see app/config.py's validator) rather than boot
      # successfully and silently reject every target registration.
      BACKEND_ALLOWED_LAB_HOSTS: ${BACKEND_ALLOWED_LAB_HOSTS}
      # Same reasoning as above: no :-default, see app/config.py's validator.
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --------------------------------------------------------------------
  # Scanner Service — Nmap/Nuclei/Nikto/WhatWeb/ZAP adapters (Módulo 4)
  #
  # The only service that bridges app-network and lab-network: n8n/backend
  # reach it over app-network, and it's the one thing allowed to reach the
  # lab targets. Stateless — no DB dependency, no persistence of its own.
  # --------------------------------------------------------------------
  scanner:
    build:
      context: ./scanner
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-scanner
    restart: unless-stopped
    environment:
      SCANNER_MAX_TIMEOUT_SECONDS: ${SCANNER_MAX_TIMEOUT_SECONDS:-900}
    ports:
      - "${SCANNER_PORT:-8100}:8100"
    networks:
      - app-network
      - lab-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --------------------------------------------------------------------
  # Reports Service — Jinja2 + WeasyPrint (Módulo 7)
  # --------------------------------------------------------------------
  # reports:
  #   build:
  #     context: ./reports
  #   container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-reports
  #   restart: unless-stopped
  #   env_file: .env
  #   volumes:
  #     - reports-data:/data/reports
  #   ports:
  #     - "${REPORTS_PORT:-8200}:8200"
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 15s

  # --------------------------------------------------------------------
  # n8n — pipeline orchestration (Módulo 6)
  #
  # Orchestrator only: every node in n8n/workflows/vulnscan-pipeline.json
  # is an HTTP call into the Backend or Scanner Service — no business logic
  # lives in the workflow itself. Two entry points feed the same pipeline:
  # the Webhook trigger (called by the Backend's
  # POST /targets/{id}/pipeline, the production path) and a Form trigger
  # (opened directly in n8n's UI, for running/demoing the pipeline without
  # the Backend or a frontend — see n8n/README.md).
  # --------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # Basic auth protects the editor UI/API only — it does not gate
      # webhook URLs, so the Backend's service-to-service call to the
      # pipeline trigger needs no credentials.
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    ports:
      - "${N8N_PORT:-5678}:5678"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------
  # Frontend — React + TypeScript dashboard (Módulo 8)
  # --------------------------------------------------------------------
  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-frontend
  #   restart: unless-stopped
  #   env_file: .env
  #   ports:
  #     - "${FRONTEND_PORT:-8080}:80"
  #   networks:
  #     - app-network
  #   depends_on:
  #     backend:
  #       condition: service_healthy

  # --------------------------------------------------------------------
  # Vulnerable lab targets — segmented network (Módulo 2)
  #
  # Both apps live exclusively on `lab-network`: app-network services
  # (frontend, n8n, backend, db) have no route to them at all. Only the
  # Scanner Service (Módulo 4) bridges both networks. Host ports are still
  # published for local browser access. See docs/lab.md for the
  # legal/ethical scope of this lab and why the network is not marked
  # `internal: true`.
  # --------------------------------------------------------------------
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-juice-shop
    restart: unless-stopped
    ports:
      - "${JUICE_SHOP_PORT:-3000}:3000"
    networks:
      - lab-network
    healthcheck:
      # Image is distroless (no shell, no curl/wget): probe with Node's
      # own HTTP client instead of a CMD-SHELL healthcheck.
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-dvwa
    restart: unless-stopped
    ports:
      - "${DVWA_PORT:-3001}:80"
    networks:
      - lab-network
    healthcheck:
      # Image has no curl/wget either; a bare TCP probe on Apache's port
      # is enough here since dvwa-init does its own HTTP-level readiness
      # check (and retries) before touching the database. /dev/tcp only
      # exists in bash, not the image's default /bin/sh (dash) — invoke
      # bash explicitly rather than using CMD-SHELL.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/80"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # One-shot: replays the setup.php "Create / Reset Database" submission so
  # DVWA is fully usable without a manual browser step. See
  # lab/dvwa-init/entrypoint.sh.
  dvwa-init:
    build:
      context: ./lab/dvwa-init
    container_name: ${COMPOSE_PROJECT_NAME:-vulnscan}-dvwa-init
    environment:
      DVWA_URL: http://dvwa:80
    networks:
      - lab-network
    depends_on:
      dvwa:
        condition: service_healthy
    restart: "no"
